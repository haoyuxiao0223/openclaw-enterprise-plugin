apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: {{ include "openclaw.name" . }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: {{ include "openclaw.name" . }}
    app.kubernetes.io/component: gateway
