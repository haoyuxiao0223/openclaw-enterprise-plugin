version: "3.9"

services:
  openclaw:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.enterprise
    ports:
      - "18789:18789"
      - "9090:9090"
    environment:
      - OPENCLAW_ENTERPRISE_ENABLED=true
      - DATABASE_URL=postgres://openclaw:openclaw@postgres:5432/openclaw
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./openclaw.json:/root/.openclaw/openclaw.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
      POSTGRES_DB: openclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../rls-policies.sql:/docker-entrypoint-initdb.d/02-rls.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
